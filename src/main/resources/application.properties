spring.application.name=bulletinBoard
server.port=8080

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Data base
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/bulletinBoard}
spring.datasource.username=${DB_USER:postgres}
# password
spring.datasource.password=${DB_PASSWORD:passwod}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


# Swagger OpenAPI configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.show-actuator=false

# Swagger JWT configuration
springdoc.swagger-ui.oauth.client-id=swagger
springdoc.swagger-ui.oauth.use-pkce=false
springdoc.swagger-ui.oauth.=use-basic-authentication-with-access-code-grant=false

jwt.expiration=86400000
jwt.secret=${JWT_SECRET:dGhpcy1pcy1hLXNlY3JldC1qd3Qta2V5LWZvci10ZXN0aW5nLXB1cnBvc2VzLTEyMzQ1Ng==}

#
springdoc.swagger-ui.authorization-header-name=Authorization

#
logging.level.io.jsonwebtoken=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.ru.test.congratulations=DEBUG
logging.level.org.springframework.web=DEBUG

file.upload-dir=uploads/images/