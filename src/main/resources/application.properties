spring.application.name=bulletinBoard
server.port=8080

# JPA
# spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Data base
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/bulletinBoard}
spring.datasource.username=${DB_USER:postgres}
# password
spring.datasource.password=${DB_PASSWORD:passwod}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# off automatic migration creation by hibernation
spring.jpa.hibernate.ddl-auto=none

# Flyway settings
spring.flyway.enabled=true
spring.flyway.locations=${DB_MIGRATION_PATH:classpath:db/migration}
spring.flyway.baseline-on-migrate=true

# Flyway logging
logging.level.org.flywaydb=DEBUG
logging.level.org.springframework.jdbc=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.tool.schema=DEBUG

# Swagger OpenAPI configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.show-actuator=false

# Swagger JWT configuration
springdoc.swagger-ui.oauth.client-id=swagger
springdoc.swagger-ui.oauth.use-pkce=false
springdoc.swagger-ui.oauth.=use-basic-authentication-with-access-code-grant=false

# KEYCLOAK CONFIGURATION
keycloak.auth-server-url=http://localhost:9090
keycloak.realm=bulletin-board
keycloak.resource=bulletin-board-client
keycloak.credentials.secret=${KEYCLOAK_CLIENT_SECRET:keycloak-client-secret}
keycloak.admin.client-id=admin-cli

# Admin credentials for Keycloak
keycloak.admin.username=${KEYCLOAK_ADMIN_NAME:admin}
keycloak.admin.password=${KEYCLOAK_ADMIN_PASS:admin}

# OAuth2 Keycloak (for login by Keycloak)
spring.security.oauth2.client.registration.keycloak.client-id=${keycloak.resource}
spring.security.oauth2.client.registration.keycloak.client-secret=${keycloak.credentials.secret}
spring.security.oauth2.client.registration.keycloak.scope=openid,profile,email
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.keycloak.redirect-uri={baseUrl}/login/oauth2/code/keycloak

spring.security.oauth2.client.provider.keycloak.issuer-uri=${spring.security.oauth2.resourceserver.jwt.issuer-uri}
spring.security.oauth2.client.provider.keycloak.authorization-uri=${keycloak.auth-server-url}/realms/${keycloak.realm}/protocol/openid-connect/auth
spring.security.oauth2.client.provider.keycloak.token-uri=${keycloak.auth-server-url}/realms/${keycloak.realm}/protocol/openid-connect/token
spring.security.oauth2.client.provider.keycloak.user-info-uri=${keycloak.auth-server-url}/realms/${keycloak.realm}/protocol/openid-connect/userinfo
spring.security.oauth2.client.provider.keycloak.jwk-set-uri=${keycloak.auth-server-url}/realms/${keycloak.realm}/protocol/openid-connect/certs
spring.security.oauth2.client.provider.keycloak.user-name-attribute=preferred_username

# Cookie settings
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=lax

# CORS settings
cors.allowed-origins=http://localhost:3000,http://localhost:8080
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# naming bearer label
springdoc.swagger-ui.authorization-header-name=Authorization

# JWT CONVERTER
jwt.auth.converter.principle-attribute=preferred_username
jwt.auth.converter.resource-id=bulletin-board-client

# OAUTH2 RESOURCE SERVER
spring.security.oauth2.resourceserver.jwt.issuer-uri=${keycloak.auth-server-url}/realms/${keycloak.realm}

file.upload-dir=uploads/images/

# Logs
logging.config=classpath:logback-spring.xml
spring.profiles.active=dev

logging.level.ru.daniil.bulletinBoard.service.UserService=DEBUG
logging.level.ru.daniil.bulletinBoard.config.SpringSecurityConfig=DEBUG
logging.level.ru.daniil.bulletinBoard=DEBUG