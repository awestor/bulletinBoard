services:
  postgres:
    image: postgres:16
    container_name: my_postgres
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: keycloak
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  keycloak:
    container_name: keycloak_demo
    image: quay.io/keycloak/keycloak:25.0.5
    ports:
      - "9090:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin

      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: user
      KC_DB_PASSWORD: password
      KC_DB_SCHEMA: public

      # здесь указывается эллиес, что будет использоваться вместо localhost
      KC_HOSTNAME: docker.org
      KC_HOSTNAME_URL: http://docker.org:9090
      KC_HOSTNAME_PORT: 9090
      KC_HOSTNAME_STRICT: false
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT_BACKCHANNEL: false

      KC_HEALTH_ENABLED: true
      KC_METRICS_ENABLED: true

    command: start-dev
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - keycloak_data:/opt/keycloak/data
    restart: unless-stopped
    networks:
      - app-network

  redis:
    image: redis:8.0-alpine
    container_name: app-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "--raw", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app-network

  postgres_app:
    image: postgres:16
    container_name: postgres_app
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bulletin_board
      PGPORT: 5433
    ports:
      - "5433:5433"
    volumes:
      - postgres_app_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d bulletin_board -p 5433" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network


  app:
    build:
      context: .
      dockerfile: app.dockerfile
    container_name: spring-app
    restart: unless-stopped
    depends_on:
      postgres_app:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    ports:
      - "${APP_PORT:-8080}:8080"
    extra_hosts:
      - "docker.org:host-gateway"
    environment:
      DB_URL: ${DB_URL}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}

      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:-}

      KEYCLOAK_AUTH_SERVER_URL: http://docker.org:9090
      KEYCLOAK_EXTERNAL_URL: http://docker.org:9090
      KEYCLOAK_REALM: bulletin-board
      KEYCLOAK_CLIENT_ID: bulletin-board-client
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}

      SPRING_PROFILES_ACTIVE: docker

      JAVA_TOOL_OPTIONS: -Dlogging.level.root=${LOG_LEVEL:-INFO}

    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
  keycloak_data:
  redis_data:
  postgres_app_data:

networks:
  app-network:
    driver: bridge