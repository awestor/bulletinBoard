spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bulletinBoard}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    open-in-view: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    # автопоиск миграций в других модулях
    locations:
      - classpath:db/migration
      - classpath:com/example/user/impl/db/migration
      - classpath:com/example/order/impl/db/migration

# Логирование БД
logging:
  level:
    org.flywaydb: DEBUG
    org.springframework.jdbc: DEBUG
    org.hibernate.tool.schema: DEBUG